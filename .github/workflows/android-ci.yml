name: Android CI

on:
  push:
    branches: ["main"]
    paths: ["android/**", ".github/workflows/android-ci.yml"]
  pull_request:
    branches: ["main"]
    paths: ["android/**", ".github/workflows/android-ci.yml"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Unit tests
        working-directory: android
        run: gradle :app:testDebugUnitTest --stacktrace
      - name: Assemble debug APK
        working-directory: android
        run: gradle :app:assembleDebug --stacktrace
      - name: Sign stable sideload APK
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL 'https://android.googlesource.com/platform/build/+/refs/heads/master/target/product/security/testkey.pk8?format=TEXT' | base64 -d > /tmp/testkey.pk8
          curl -fsSL 'https://android.googlesource.com/platform/build/+/refs/heads/master/target/product/security/testkey.x509.pem?format=TEXT' | base64 -d > /tmp/testkey.x509.pem
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)"
          "$APKSIGNER" sign \
            --key /tmp/testkey.pk8 \
            --cert /tmp/testkey.x509.pem \
            --out android/app/build/outputs/apk/debug/analista-stable.apk \
            android/app/build/outputs/apk/debug/app-debug.apk
          "$APKSIGNER" verify --verbose --print-certs android/app/build/outputs/apk/debug/analista-stable.apk
      - name: Build release acceptance bundle
        shell: bash
        run: |
          set -euo pipefail
          APK_DIR="android/app/build/outputs/apk/debug"
          APK="$APK_DIR/analista-stable.apk"
          VERSION_NAME="$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' android/app/build.gradle.kts | head -1)"
          VERSION_CODE="$(sed -n 's/.*versionCode = \([0-9][0-9]*\).*/\1/p' android/app/build.gradle.kts | head -1)"
          APPLICATION_ID="$(sed -n 's/.*applicationId = "\([^"]*\)".*/\1/p' android/app/build.gradle.kts | head -1)"
          APK_SHA256="$(sha256sum "$APK" | awk '{print $1}')"
          printf '%s  %s\n' "$APK_SHA256" "analista-stable.apk" > "$APK_DIR/analista-stable.apk.sha256"
          cat > "$APK_DIR/release-manifest.txt" <<EOF
          product=Analista Android V3
          applicationId=$APPLICATION_ID
          versionName=$VERSION_NAME
          versionCode=$VERSION_CODE
          commit=$GITHUB_SHA
          apkSha256=$APK_SHA256
          releaseGate=institutional-release-gate-1
          executionMode=manual_review
          strategyDirection=long_only
          buySetupActiveEnabled=false
          portfolioConstructionEnabled=false
          signing=AOSP_test_key_for_sideload_validation
          EOF
          cp android/DEVICE_ACCEPTANCE_HYPEROS.md "$APK_DIR/DEVICE_ACCEPTANCE_HYPEROS.md"
      - uses: actions/upload-artifact@v4
        with:
          name: analista-stable-apk
          path: |
            android/app/build/outputs/apk/debug/analista-stable.apk
            android/app/build/outputs/apk/debug/analista-stable.apk.sha256
            android/app/build/outputs/apk/debug/release-manifest.txt
            android/app/build/outputs/apk/debug/DEVICE_ACCEPTANCE_HYPEROS.md
          if-no-files-found: error
