name: Android CI

on:
  push:
    branches: ["main"]
    paths: ["android/**", ".github/workflows/android-ci.yml"]
  pull_request:
    branches: ["main"]
    paths: ["android/**", ".github/workflows/android-ci.yml"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Unit tests
        working-directory: android
        run: gradle :app:testDebugUnitTest --stacktrace
      - name: Assemble debug APK
        working-directory: android
        run: gradle :app:assembleDebug --stacktrace
      - name: Sign stable sideload APK
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL 'https://android.googlesource.com/platform/build/+/refs/heads/master/target/product/security/testkey.pk8?format=TEXT' | base64 -d > /tmp/testkey.pk8
          curl -fsSL 'https://android.googlesource.com/platform/build/+/refs/heads/master/target/product/security/testkey.x509.pem?format=TEXT' | base64 -d > /tmp/testkey.x509.pem
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)"
          "$APKSIGNER" sign \
            --key /tmp/testkey.pk8 \
            --cert /tmp/testkey.x509.pem \
            --out android/app/build/outputs/apk/debug/analista-stable.apk \
            android/app/build/outputs/apk/debug/app-debug.apk
          "$APKSIGNER" verify --verbose --print-certs android/app/build/outputs/apk/debug/analista-stable.apk
      - uses: actions/upload-artifact@v4
        with:
          name: analista-stable-apk
          path: android/app/build/outputs/apk/debug/analista-stable.apk
          if-no-files-found: error
