name: Android CI

on:
  push:
    branches: ["main"]
    paths: ["android/**", ".github/workflows/android-ci.yml"]
  pull_request:
    branches: ["main"]
    paths: ["android/**", ".github/workflows/android-ci.yml"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Unit tests and Android lint
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest :app:lintDebug --stacktrace
      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --stacktrace
      - name: Prepare auditable debug artifact
        shell: bash
        run: |
          set -euo pipefail
          cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/analista-debug.apk
      - name: Build debug acceptance bundle
        shell: bash
        run: |
          set -euo pipefail
          APK_DIR="android/app/build/outputs/apk/debug"
          APK="$APK_DIR/analista-debug.apk"
          VERSION_NAME="$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' android/app/build.gradle.kts | head -1)"
          VERSION_CODE="$(sed -n 's/.*versionCode = \([0-9][0-9]*\).*/\1/p' android/app/build.gradle.kts | head -1)"
          APPLICATION_ID="$(sed -n 's/.*applicationId = "\([^"]*\)".*/\1/p' android/app/build.gradle.kts | head -1)"
          SOURCE_COMMIT="${{ github.event.pull_request.head.sha || github.sha }}"
          APK_SHA256="$(sha256sum "$APK" | awk '{print $1}')"
          printf '%s  %s\n' "$APK_SHA256" "analista-debug.apk" > "$APK_DIR/analista-debug.apk.sha256"
          cat > "$APK_DIR/release-manifest.txt" <<EOF
          product=Analista Android V3
          applicationId=$APPLICATION_ID
          versionName=$VERSION_NAME
          versionCode=$VERSION_CODE
          commit=$SOURCE_COMMIT
          apkSha256=$APK_SHA256
          releaseGate=institutional-release-gate-1
          executionMode=manual_review
          strategyDirection=long_only
          buySetupActiveEnabled=false
          portfolioConstructionEnabled=false
          signing=ANDROID_DEBUG_KEY_NOT_FOR_PRODUCTION
          EOF
          cp android/DEVICE_ACCEPTANCE_HYPEROS.md "$APK_DIR/DEVICE_ACCEPTANCE_HYPEROS.md"
      - uses: actions/upload-artifact@v4
        with:
          name: analista-debug-apk
          path: |
            android/app/build/outputs/apk/debug/analista-debug.apk
            android/app/build/outputs/apk/debug/analista-debug.apk.sha256
            android/app/build/outputs/apk/debug/release-manifest.txt
            android/app/build/outputs/apk/debug/DEVICE_ACCEPTANCE_HYPEROS.md
          if-no-files-found: error
