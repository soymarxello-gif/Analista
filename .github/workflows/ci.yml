name: Analista CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Validate project
        run: python tools/validate_project.py

      - name: Config tests
        run: pytest tests/test_config.py -q

      - name: Final score tests
        run: pytest tests/test_final_score.py -q

      - name: Signal tests
        run: pytest tests/test_signal_classifier.py -q

      - name: Options tests
        run: pytest tests/test_options_score.py -q

      - name: Audit postprocessor tests
        run: pytest tests/test_audit_postprocessor.py -q

      - name: Full test suite
        run: pytest -q

      - name: Ruff import/syntax check
        run: ruff check .
