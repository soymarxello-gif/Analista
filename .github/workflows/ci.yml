name: Analista CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Validate project
        run: python tools/validate_project.py

      - name: Config tests
        run: pytest tests/test_config.py -q

      - name: Direct final score check
        run: |
          python - <<'PY'
          from scoring.final_score import calculate_final_score
          weights = {
              "relative_strength": 11.4, "trend": 11.0, "market_regime": 10.7,
              "volume_accumulation": 10.3, "sector_rotation": 9.5,
              "structure_trigger": 9.0, "risk_reward_atr": 8.4,
              "liquidity": 7.6, "momentum": 6.9, "options_flow": 6.1,
              "fundamentals": 5.1, "sentiment": 4.0,
          }
          scores = {
              "rs_score": 1, "trend_score": 1, "market_regime_score": 1,
              "volume_score": 1, "sector_score": 1, "structure_score": 1,
              "rr_score": 1, "liquidity_score": 1, "momentum_score": 1,
              "options_score": 1, "fundamental_score": 1, "sentiment_score": 1,
          }
          result = calculate_final_score(scores, {"scoring_weights": weights})
          assert result == 100.0, result
          PY

      - name: Final score pytest diagnostics
        continue-on-error: true
        run: pytest tests/test_final_score.py -vv --tb=short

      - name: Signal tests
        run: pytest tests/test_signal_classifier.py -q

      - name: Options tests
        run: pytest tests/test_options_score.py -q

      - name: Audit postprocessor tests
        run: pytest tests/test_audit_postprocessor.py -q

      - name: Ruff import/syntax check
        run: ruff check .
