name: Analista CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Validate project
        run: python tools/validate_project.py

      - name: Config tests
        run: pytest tests/test_config.py -q

      - name: Final score deterministic gate
        run: |
          python - <<'PY'
          from scoring.final_score import calculate_final_score
          weights = {
              "relative_strength": 11.4, "trend": 11.0, "market_regime": 10.7,
              "volume_accumulation": 10.3, "sector_rotation": 9.5,
              "structure_trigger": 9.0, "risk_reward_atr": 8.4,
              "liquidity": 7.6, "momentum": 6.9, "options_flow": 6.1,
              "fundamentals": 5.1, "sentiment": 4.0,
          }
          scores = {
              "rs_score": 1, "trend_score": 1, "market_regime_score": 1,
              "volume_score": 1, "sector_score": 1, "structure_score": 1,
              "rr_score": 1, "liquidity_score": 1, "momentum_score": 1,
              "options_score": 1, "fundamental_score": 1, "sentiment_score": 1,
          }
          assert calculate_final_score(scores, {"scoring_weights": weights}) == 100.0
          assert calculate_final_score({"rs_score": 2.5}, {"scoring_weights": {"relative_strength": 100}}) == 100.0
          assert calculate_final_score({"rs_score": -1}, {"scoring_weights": {"relative_strength": 100}}) == 0.0
          PY

      - name: Signal liquidity veto
        run: pytest tests/test_signal_classifier.py::test_veto_liquidity_fail -q

      - name: Signal no valid setup veto
        run: pytest tests/test_signal_classifier.py::test_veto_no_valid_setup -q

      - name: Signal trigger confirmed
        run: pytest tests/test_signal_classifier.py::test_trigger_confirmed_requires_valid_quote -q

      - name: Signal low quote blocked
        run: pytest tests/test_signal_classifier.py::test_low_quote_cannot_trigger_confirmed -q

      - name: Signal ready wait trigger
        run: pytest tests/test_signal_classifier.py::test_ready_wait_trigger_without_trigger -q

      - name: Signal hard filters
        run: pytest tests/test_signal_classifier.py::test_price_and_market_cap_are_hard_filters -q

      - name: Signal buy active disabled
        run: pytest tests/test_signal_classifier.py::test_buy_setup_active_is_never_emitted -q

      - name: Options unknown data
        run: pytest tests/test_options_score.py::test_options_no_data_is_unknown -q

      - name: Options bullish data
        run: pytest tests/test_options_score.py::test_options_bullish_case -q

      - name: Options crowded bullish
        run: pytest tests/test_options_score.py::test_extremely_low_put_call_sets_crowded_warning -q

      - name: Audit invalid bid ask
        run: pytest tests/test_audit_postprocessor.py::test_invalid_bidask_cannot_be_trigger_confirmed -q

      - name: Audit price filter
        run: pytest tests/test_audit_postprocessor.py::test_price_filter_is_hard -q

      - name: Audit market cap filter
        run: pytest tests/test_audit_postprocessor.py::test_market_cap_filter_is_hard -q

      - name: Audit trigger semantics
        run: |
          pytest tests/test_audit_postprocessor.py::test_ready_wait_trigger_semantics -q
          pytest tests/test_audit_postprocessor.py::test_trigger_confirmed_semantics -q

      - name: Audit veto semantics
        run: |
          pytest tests/test_audit_postprocessor.py::test_no_valid_setup_is_veto -q
          pytest tests/test_audit_postprocessor.py::test_veto_has_no_actionable_levels -q

      - name: Audit disabled signal and ranking
        run: |
          pytest tests/test_audit_postprocessor.py::test_buy_setup_active_disabled -q
          pytest tests/test_audit_postprocessor.py::test_ranking_audit_preserves_rows_and_signals -q

      - name: Ruff import/syntax check
        run: ruff check .
