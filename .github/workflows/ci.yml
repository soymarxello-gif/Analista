name: Analista CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Validate project structure
        run: python tools/validate_project.py

      - name: Validate audited config
        run: python -c "from tools.validate_audited_logic import validate_config; validate_config()"

      - name: Validate final score
        run: python -c "from tools.validate_audited_logic import validate_final_score; validate_final_score()"

      - name: Validate signal semantics
        run: python -c "from tools.validate_audited_logic import validate_signals; validate_signals()"

      - name: Validate options semantics
        run: python -c "from tools.validate_audited_logic import validate_options; validate_options()"

      - name: Validate scan postprocessor
        run: python -c "from tools.validate_audited_logic import validate_postprocessor; validate_postprocessor()"

      - name: Validate scan schema contract
        run: pytest tests/test_scan_schema.py -q

      - name: Ruff critical import and syntax check
        run: ruff check . --select E9,F63,F7,F82
